<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAE Petrol Calculator </title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        
        .calculator {
            background: #fff;
            padding: 30px 35px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        
        input[type="number"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border: 2px solid #b2dfdb;
            border-radius: 8px;
            font-size: 16px;
        }

        input[type="number"]:focus {
            border-color: #00796b;
            outline: none;
        }

        
        button {
            background-color: #00796b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004d40;
        }

        
        #totalCost {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #d32f2f;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>UAE Petrol Calculator</h2>

        <!-- Cost per liter -->
        <label for="costPerLiter">Cost per liter (AED):</label><br>
        <input type="number" id="costPerLiter" value="1.72" step="0.01" min="0"><br>

        <!-- Liters -->
        <label for="liters">Liters purchased:</label><br>
        <input type="number" id="liters" value="0" step="0.1" min="0"><br>

        <!-- Calculate button -->
        <button onclick="calculateTotal()">Calculate Total</button>

        <!-- Display result -->
        <p id="totalCost">Total Cost: AED 0.00</p>
    </div>

    <script>
       
        function calculateTotal() {
            
            let costPerLiter = parseFloat(document.getElementById('costPerLiter').value);
            let liters = parseFloat(document.getElementById('liters').value);

           
            if (isNaN(costPerLiter) || isNaN(liters) || costPerLiter < 0 || liters < 0) {
                alert("Please enter valid positive numbers!");
                return;
            }

            
            let total = costPerLiter * liters;

           
            document.getElementById('totalCost').innerText = `Total Cost: AED ${total.toFixed(2)}`;
        }
    </script>

</body>
</html>
